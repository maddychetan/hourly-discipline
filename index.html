<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#050505">
    <meta name="description" content="Strict hourly planner with local analytics.">
    <title>Hourly Discipline</title>
    <link rel="manifest" href="manifest.webmanifest?v=7">
    <link rel="icon" href="icon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="styles.css?v=7">
  </head>
  <body>
    <main class="app" aria-live="polite">
      <header class="topbar">
        <div>
          <p class="date" id="dateLabel"></p>
          <h1>24 Hours</h1>
        </div>
        <button class="icon-button" id="addTask" type="button" aria-label="Add task">+</button>
      </header>

      <section class="status" aria-label="Daily status">
        <article>
          <span>Score</span>
          <strong id="dailyScore">0%</strong>
        </article>
        <article>
          <span>Streak</span>
          <strong id="streakCount">0</strong>
        </article>
        <article>
          <span>Sleep</span>
          <input id="sleepHours" type="number" min="0" max="14" step="0.25" inputmode="decimal" placeholder="6+">
        </article>
      </section>

      <p class="insight" id="singleInsight" hidden></p>

      <section class="timeline" id="timeline" aria-label="24 hour task timeline"></section>

      <section class="editor" id="editor" hidden>
        <div class="editor-head">
          <strong id="editorTitle">Edit hour</strong>
          <button class="icon-button small" id="closeEditor" type="button" aria-label="Close editor">X</button>
        </div>
        <input id="editTitle" type="text" maxlength="48" aria-label="Task title">
        <textarea id="editNotes" maxlength="160" aria-label="Notes" placeholder="Notes"></textarea>
        <div class="field-row">
          <input id="editTime" type="time" aria-label="Planned time">
          <select id="editCategory" aria-label="Category">
            <option>Routine</option>
            <option>Gym</option>
            <option>Work</option>
            <option>Study</option>
            <option>Food</option>
            <option>Sleep</option>
          </select>
          <select id="editStatus" aria-label="Missed action">
            <option value="active">Active</option>
            <option value="skipped">Skipped</option>
          </select>
        </div>
        <label class="check-row">
          <input id="editKey" type="checkbox">
          <span>Key task</span>
        </label>
        <div class="actions">
          <button class="secondary" id="deleteTask" type="button">Delete</button>
          <button class="primary" id="saveEdit" type="button">Save</button>
        </div>
      </section>
    </main>

    <section class="focus" id="focusMode" hidden>
      <button class="icon-button focus-close" id="exitFocus" type="button" aria-label="Exit focus">X</button>
      <p id="focusTime"></p>
      <h2 id="focusTitle"></h2>
      <span id="focusMeta"></span>
      <button class="complete-focus" id="completeFocus" type="button">Complete</button>
    </section>

    <script src="app.js?v=7"></script>
  </body>
</html>
